
<!-- Write a jQuery program to hide all headings on a page when they are clicked. o Also
find the position of the mouse pointer relative to the left and top edges of the
document -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"> </script>
    <script>
        $(document).ready(function(){
         $("#srv").click(function(){
         $("p").hide();
         }); 
        });
    </script>
</head>
<body>
    <p >This is first  paragraph</p>
    <p>This is second paragraph </p>

    <button id="srv">Button</button>

</body>
</html>
